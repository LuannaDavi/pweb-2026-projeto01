<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Auto da Compadecida{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:ital@0;1&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --amarelo:  #E8B84B;
            --laranja:  #C45C26;
            --marrom:   #3D1C02;
            --creme:    #F5EDD6;
            --vermelho: #8B1A1A;
        }

        body {
            background-color: var(--marrom);
            background-image:
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 40px,
                    rgba(232,184,75,0.04) 40px,
                    rgba(232,184,75,0.04) 41px
                );
            color: var(--creme);
            font-family: 'Lora', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── NAVBAR ── */
        nav {
            background: var(--marrom);
            border-bottom: 3px solid var(--amarelo);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .nav-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 3px;
            color: var(--amarelo);
            text-decoration: none;
            padding: 1rem 0;
            line-height: 1;
        }

        .nav-logo span {
            display: block;
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 0.65rem;
            letter-spacing: 5px;
            color: rgba(232,184,75,0.6);
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 0.25rem;
            list-style: none;
        }

        .nav-links a {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 2px;
            font-size: 1rem;
            color: var(--creme);
            text-decoration: none;
            padding: 0.5rem 1.1rem;
            border: 1px solid transparent;
            border-radius: 2px;
            transition: all 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.ativo {
            color: var(--amarelo);
            border-color: var(--amarelo);
            background: rgba(232,184,75,0.08);
        }

        /* ── CONTEÚDO PRINCIPAL ── */
        main {
            flex: 1;
            padding: 2.5rem 2rem;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        /* ── FOOTER ── */
        footer {
            background: #1a0a00;
            border-top: 3px solid var(--laranja);
            padding: 1.5rem 2rem;
            text-align: center;
        }

        footer p {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 0.85rem;
            color: rgba(245,237,214,0.5);
            margin-bottom: 0.3rem;
        }

        footer .copyright {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 2px;
            font-size: 0.8rem;
            color: var(--amarelo);
        }

        /* ── TÍTULO DE PÁGINA ── */
        .page-header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(232,184,75,0.3);
        }

        .page-header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            letter-spacing: 5px;
            color: var(--amarelo);
            line-height: 1;
        }

        .page-header p {
            font-style: italic;
            color: rgba(245,237,214,0.6);
            margin-top: 0.5rem;
        }

        .ornamento {
            text-align: center;
            color: var(--amarelo);
            font-size: 1.2rem;
            letter-spacing: 8px;
            margin: 1rem 0;
            opacity: 0.6;
        }
    </style>
    {% block css %}{% endblock %}
</head>
<body>

    <nav>
        <a href="{% url 'inicio' %}" class="nav-logo">
            Auto da Compadecida
            <span>★ o filme ★</span>
        </a>
        <ul class="nav-links">
            <li><a href="{% url 'inicio' %}">Início</a></li>
            <li><a href="{% url 'elenco' %}">Elenco</a></li>
            <li><a href="{% url 'sobre' %}">Sobre</a></li>
        </ul>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

</body>
</html>
