{% extends "base.html" %}

{% block titulo %}Sobre — Auto da Compadecida{% endblock %}

{% block css %}
<style>
    .sobre-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
        margin-top: 2rem;
    }

    .bloco {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(232,184,75,0.2);
        border-radius: 4px;
        padding: 1.5rem;
    }

    .bloco h2 {
        font-family: 'Bebas Neue', sans-serif;
        letter-spacing: 3px;
        font-size: 1.4rem;
        color: var(--amarelo);
        margin-bottom: 1rem;
        padding-bottom: 0.6rem;
        border-bottom: 1px solid rgba(232,184,75,0.2);
    }

    .bloco p {
        font-size: 0.95rem;
        line-height: 1.85;
        color: rgba(245,237,214,0.8);
        margin-bottom: 0.75rem;
    }

    /* ── AUTORES ── */
    .autores-lista {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .autor-card {
        display: flex;
        align-items: center;
        gap: 1rem;
        background: rgba(0,0,0,0.2);
        border-radius: 3px;
        padding: 0.75rem;
        border: 1px solid rgba(232,184,75,0.1);
    }

    .autor-avatar {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        background: var(--laranja);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.2rem;
        color: var(--creme);
        flex-shrink: 0;
        border: 2px solid var(--amarelo);
    }

    .autor-info p {
        margin: 0;
        font-size: 0.9rem;
        color: rgba(245,237,214,0.85);
    }

    .autor-info .autor-nome {
        font-family: 'Lora', serif;
        font-weight: bold;
        color: var(--creme);
        font-size: 0.95rem;
    }

    .autor-info .autor-turma {
        font-style: italic;
        color: rgba(245,237,214,0.45);
        font-size: 0.8rem;
    }

    /* ── INFO DO SITE ── */
    .tag-lista {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.75rem;
    }

    .tag {
        background: rgba(232,184,75,0.1);
        border: 1px solid rgba(232,184,75,0.3);
        color: var(--amarelo);
        font-family: 'Bebas Neue', sans-serif;
        letter-spacing: 1.5px;
        font-size: 0.75rem;
        padding: 4px 10px;
        border-radius: 2px;
    }

    .bloco-full {
        grid-column: 1 / -1;
    }
</style>
{% endblock %}

{% block content %}

    <div class="bloco bloco-full">
        <h2>Sobre o Filme</h2>
        <p>{{ sobre.historia }}</p>
        <p>{{ sobre.curiosidades }}</p>
    </div>

{% endblock %}
